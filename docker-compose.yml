# docker-compose.yml — Local Docker testing
#
# Usage:
#   docker compose up --build     # build image locally and start
#   docker compose up -d          # run in background
#   docker compose logs -f        # tail logs
#   docker compose down           # stop and remove container
#
# Prerequisites:
#   - .env.local must exist (copy from .env.example)
#   - Docker Desktop running

version: "3.9"

services:
  har-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: har-api:local
    container_name: har-api-local
    ports:
      - "8888:8888"
    env_file:
      # Loads all variables from .env.local into the container.
      # HOST and ENV below override the .env.local values so Docker
      # networking works correctly (uvicorn must bind to 0.0.0.0 inside
      # the container even when .env.local has HOST=127.0.0.1 for native runs).
      - .env.local
    environment:
      HOST: "0.0.0.0"
      ENV: "live"
      PORT: "8888"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
