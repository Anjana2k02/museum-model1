name: Build, Push & Deploy HAR API

on:
  push:
    branches:
      - master

# Cancel any in-flight run for the same branch when a new push arrives.
# Prevents two deploy jobs from racing each other on the server.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/har-api

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # JOB 1 — Build Docker image and push to Docker Hub
  # ───────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA tag
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Enables BuildKit: advanced layer caching, faster parallel builds

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          # Pull the previous :latest from Docker Hub as a layer cache source.
          # Unchanged layers (pip install, model copy) are reused — saves minutes.
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ───────────────────────────────────────────────────────────────────────
  # JOB 2 — SSH into server and deploy the new image
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push   # only runs if build-and-push succeeded

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ env.IMAGE_NAME }}:latest"
            CONTAINER="har-api"
            ENV_FILE="/opt/har-api/.env"
            PORT="8888"

            echo "=== Pulling latest image ==="
            docker pull "${IMAGE}"

            echo "=== Stopping old container (if any) ==="
            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm   "${CONTAINER}" 2>/dev/null || true

            echo "=== Starting new container ==="
            docker run -d \
              --name "${CONTAINER}" \
              --restart unless-stopped \
              --env-file "${ENV_FILE}" \
              -e PUBLIC_BASE_URL=https://museum-model1-production.up.railway.app \
              -e HOST=0.0.0.0 \
              -e ENV=live \
              -p "${PORT}:${PORT}" \
              "${IMAGE}"

            echo "=== Waiting for /health to return 200 (up to 30s) ==="
            STATUS="fail"
            for i in $(seq 1 10); do
              STATUS=$(docker exec "${CONTAINER}" \
                python -c \
                "import urllib.request, sys; \
                 r = urllib.request.urlopen('http://localhost:${PORT}/health', timeout=3); \
                 sys.exit(0 if r.status == 200 else 1)" \
                2>/dev/null && echo "ok" || echo "fail")
              if [ "${STATUS}" = "ok" ]; then
                echo "  Healthy after ${i} attempt(s)."
                break
              fi
              echo "  Attempt ${i}/10 — not ready yet, waiting 3s..."
              sleep 3
            done

            if [ "${STATUS}" != "ok" ]; then
              echo "ERROR: Container failed to become healthy. Last logs:"
              docker logs --tail 60 "${CONTAINER}"
              exit 1
            fi

            echo "=== Pruning old dangling images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
